<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Supercars Battle - Duelo de Cartas</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

   <style>
    :root {
        --primary: #e63946;
        --secondary: #1d3557;
        --light: #f1faee;
        --accent: #a8dadc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Segoe UI', sans-serif;
        background-color: var(--secondary);
        color: var(--light);
        display: flex;
        flex-direction: column;
        align-items: center;
        /* Ajuste para que todo quepa en la pantalla sin pellizcar */
        height: 100vh;
        max-height: 100vh;
        padding: 5px;
        overflow: hidden; 
    }

    h1 { font-size: 1rem; margin: 5px 0; text-transform: uppercase; }

    /* --- MENÚS --- */
    #menu {
        background: rgba(255, 255, 255, 0.1);
        padding: 10px;
        border-radius: 15px;
        width: 100%;
        max-width: 350px;
        text-align: center;
        margin-bottom: 5px;
    }

    input { padding: 8px; border-radius: 5px; border: none; width: 80px; margin: 5px; color: #000; font-size: 16px; }
    
    button {
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        background-color: var(--primary);
        color: white;
        font-weight: bold;
        cursor: pointer;
        text-transform: uppercase;
        font-size: 0.75rem;
    }

    #infoPartida {
        font-size: 0.85rem;
        margin-bottom: 5px;
        background: var(--primary);
        padding: 4px 15px;
        border-radius: 20px;
        font-weight: bold;
    }

    /* --- CARTAS COMPACTAS --- */
    #cartaJugador {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        width: 100%;
        flex: 1;
        overflow-y: auto;
    }

    .card {
        background: white;
        color: #333;
        width: 88vw;
        max-width: 290px;
        padding: 8px;
        border-radius: 15px;
        border: 4px solid #fff;
        position: relative;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .card h2 { font-size: 0.9rem; text-align: center; margin-bottom: 5px; color: var(--secondary); }
    .card img { width: 100%; height: 110px; object-fit: cover; border-radius: 8px; margin-bottom: 5px; }

    .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }

    .stat-btn {
        display: flex; 
        flex-direction: column; 
        align-items: center;
        background: #f8f9fa; 
        border: 1px solid #ddd; 
        padding: 4px 2px;
        border-radius: 6px; 
        font-size: 0.65rem; 
        cursor: pointer;
        color: #000000 !important; 
    }

    .stat-btn b { color: var(--primary) !important; font-size: 0.8rem; }

    /* --- DUELO --- */
    .duelo-container { position: relative; width: 46%; }
    .card.revelada { width: 100%; font-size: 0.6rem; border-width: 2px; padding: 5px; }
    .card.revelada img { height: 65px; }
    .card.revelada h2 { font-size: 0.7rem; }

    /* --- CHAT FIJO ABAJO --- */
    #chat-container {
        width: 100%;
        max-width: 350px;
        background: rgba(0,0,0,0.5);
        border-radius: 12px 12px 0 0;
        margin-top: auto;
        padding: 8px;
        border: 1px solid rgba(255,255,255,0.1);
    }
    #lista-mensajes {
        height: 75px;
        overflow-y: auto;
        font-size: 0.8rem;
        margin-bottom: 5px;
        color: white;
    }
    .msg { margin-bottom: 3px; line-height: 1.1; }
    .chat-input-area { display: flex; gap: 5px; }
    #inputChat { flex-grow: 1; margin: 0; width: auto; font-size: 16px; color: #000; }
</style>
</head>
<body>

    <h1>🏎️ Supercars Cards</h1>

    <div id="menu">
        <div id="controles-iniciales">
            <button onclick="crearPartida()">Crear Partida</button>
            <input type="number" id="codigoInput" placeholder="Código">
            <button onclick="unirsePartida()">Unirse</button>
        </div>
        <div id="areaCreador" style="display:none;">
            <p style="font-size: 0.8rem; margin-bottom: 8px;">Esperando jugadores...</p>
            <button onclick="iniciarJuego()" style="background-color: #2a9d8f;">¡EMPEZAR YA!</button>
        </div>
    </div>

    <div id="infoPartida">Conéctate para jugar</div>
    
    <div id="cartaJugador"></div>

    <div id="chat-container" style="display:none;">
        <div id="lista-mensajes"></div>
        <div class="chat-input-area">
            <input type="text" id="inputChat" placeholder="Mensaje...">
            <button onclick="enviarMensaje()">OK</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
