<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Supercars Battle - Duelo de Cartas</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

   <style>
    :root {
        --primary: #e63946;
        --secondary: #1d3557;
        --light: #f1faee;
        --accent: #a8dadc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Segoe UI', sans-serif;
        background-color: var(--secondary);
        color: var(--light);
        display: flex;
        flex-direction: column;
        align-items: center;
        /* Forzamos a que el contenido intente caber en la altura del móvil */
        height: 100vh;
        max-height: 100vh;
        padding: 5px;
        overflow: hidden; /* Evita el scroll global molesto */
    }

    h1 { font-size: 1rem; margin: 5px 0; text-transform: uppercase; }

    /* --- MENÚS --- */
    #menu {
        background: rgba(255, 255, 255, 0.1);
        padding: 10px;
        border-radius: 12px;
        width: 100%;
        max-width: 320px;
        text-align: center;
        margin-bottom: 5px;
    }

    input { padding: 6px; border-radius: 5px; border: none; width: 80px; margin: 2px; color: #000; font-size: 16px; }
    
    button {
        padding: 8px 12px;
        border: none;
        border-radius: 6px;
        background-color: var(--primary);
        color: white;
        font-weight: bold;
        cursor: pointer;
        text-transform: uppercase;
        font-size: 0.7rem;
    }

    #infoPartida {
        font-size: 0.8rem;
        margin-bottom: 5px;
        background: var(--primary);
        padding: 3px 15px;
        border-radius: 15px;
        font-weight: bold;
    }

    /* --- CARTAS COMPACTAS (Para que quepa el chat abajo) --- */
    #cartaJugador {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 5px;
        width: 100%;
        flex: 1; /* Ocupa el espacio disponible */
        overflow-y: auto; /* Si hay muchas cartas de duelo, permite scroll solo aquí */
    }

    .card {
        background: white;
        color: #333;
        width: 85vw; 
        max-width: 280px; /* Reducida de 320 a 280 */
        padding: 8px;
        border-radius: 12px;
        border: 4px solid #fff;
        position: relative;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .card h2 { font-size: 0.85rem; text-align: center; margin-bottom: 5px; color: var(--secondary); }
    
    /* Imagen más pequeña para ahorrar espacio vertical */
    .card img { 
        width: 100%; 
        height: 100px; /* Reducida de 130 a 100 */
        object-fit: cover; 
        border-radius: 6px; 
        margin-bottom: 5px; 
    }

    .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }

    .stat-btn {
        display: flex; 
        flex-direction: column; 
        align-items: center;
        background: #f8f9fa; 
        border: 1px solid #ddd; 
        padding: 4px 2px;
        border-radius: 5px; 
        font-size: 0.65rem; 
        color: #000 !important; 
    }

    .stat-btn b { color: var(--primary) !important; font-size: 0.75rem; }

    /* --- DUELO (Miniaturas) --- */
    .duelo-container { width: 45%; max-width: 140px; position: relative; }
    .card.revelada { width: 100%; padding: 5px; border-width: 2px; }
    .card.revelada img { height: 60px; }
    .card.revelada h2 { font-size: 0.7rem; }

    /* --- CHAT FIJO ABAJO --- */
    #chat-container {
        width: 100%;
        max-width: 350px;
        background: rgba(0,0,0,0.6);
        border-radius: 12px 12px 0 0; /* Redondeado solo arriba */
        padding: 8px;
        border: 1px solid rgba(255,255,255,0.1);
        margin-top: auto; /* Empuja el chat al final de la pantalla */
    }

    #lista-mensajes {
        height: 70px; /* Chat más bajo para que no tape la carta */
        overflow-y: auto;
        font-size: 0.75rem;
        margin-bottom: 5px;
        color: white;
    }

    .msg { margin-bottom: 2px; line-height: 1.1; }
    .chat-input-area { display: flex; gap: 4px; }
    #inputChat { flex-grow: 1; margin: 0; width: auto; font-size: 16px; color: #000; padding: 5px; }
</style>
</head>
<body>

    <h1>🏎️ Supercars</h1>

    <div id="menu">
        <div id="controles-iniciales">
            <button onclick="crearPartida()">Crear</button>
            <input type="number" id="codigoInput" placeholder="ID">
            <button onclick="unirsePartida()">Unirse</button>
        </div>
        <div id="areaCreador" style="display:none;">
            <button onclick="iniciarJuego()" style="background-color: #2a9d8f;">¡EMPEZAR YA!</button>
        </div>
    </div>

    <div id="infoPartida">Esperando...</div>
    
    <div id="cartaJugador"></div>

    <div id="chat-container" style="display:none;">
        <div id="lista-mensajes"></div>
        <div class="chat-input-area">
            <input type="text" id="inputChat" placeholder="Chat...">
            <button onclick="enviarMensaje()">OK</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
