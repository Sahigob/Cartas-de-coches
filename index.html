<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supercars Battle - 2 o 3 Jugadores</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #e63946;
            --secondary: #1d3557;
            --light: #f1faee;
            --accent: #a8dadc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--secondary);
            color: var(--light);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* --- MENÚ INICIAL --- */
        #menu {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            text-align: center;
        }

        input {
            padding: 10px;
            border-radius: 5px;
            border: none;
            width: 150px;
            font-size: 16px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background-color: #ff4d4d;
            transform: scale(1.05);
        }

        #areaCreador {
            border-top: 1px solid rgba(255,255,255,0.2);
            margin-top: 15px;
            padding-top: 15px;
        }

        /* --- ÁREA DE JUEGO --- */
        #infoPartida {
            font-size: 1.2rem;
            margin-bottom: 20px;
            background: var(--primary);
            padding: 5px 20px;
            border-radius: 20px;
        }

        #cartaJugador {
            perspective: 1000px;
        }

        .card {
            background: white;
            color: #333;
            width: 300px;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 8px solid #ddd;
        }

        .card h2 {
            margin: 0 0 10px 0;
            font-size: 1.4rem;
            text-align: center;
            color: var(--secondary);
            border-bottom: 2px solid #eee;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .grid-stats {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .stat-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            border: 1px solid #ddd;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.9rem;
            color: #444;
            transition: all 0.2s;
            text-align: left;
            width: 100%;
        }

        .stat-btn:hover {
            background: var(--accent);
            border-color: var(--secondary);
        }

        .stat-btn b {
            color: var(--primary);
        }

        .bloqueo {
            margin-top: 15px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 400px) {
            .card { width: 260px; }
        }
    </style>
</head>
<body>

    <h1>🏎️ Supercars Cards Battle</h1>

    <div id="menu">
        <div id="controles-iniciales">
            <button onclick="crearPartida()">Crear Nueva Partida</button>
            <br>
            <input type="number" id="codigoInput" placeholder="Código">
            <button onclick="unirsePartida()">Unirse</button>
        </div>

        <div id="areaCreador" style="display:none;">
            <p>Esperando a los demás jugadores...</p>
            <button onclick="iniciarJuego()" style="background-color: #2a9d8f;">¡Empezar con los que estén!</button>
        </div>
    </div>

    <div id="infoPartida">Conéctate para empezar</div>

    <div id="cartaJugador">
        </div>

    <script src="app.js"></script>

</body>
</html>
