<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supercars Battle - 2 o 3 Jugadores</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #e63946;
            --secondary: #1d3557;
            --light: #f1faee;
            --accent: #a8dadc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--secondary);
            color: var(--light);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        h1 {
            margin: 10px 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            text-align: center;
        }

        /* --- MENÚ INICIAL COMPACTO --- */
        #menu {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            width: 95%;
            max-width: 350px;
            text-align: center;
            margin-bottom: 10px;
        }

        input {
            padding: 8px;
            border-radius: 5px;
            border: none;
            width: 100px;
            margin: 5px;
        }

        button {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            background-color: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        /* --- ÁREA DE JUEGO AJUSTADA --- */
        #infoPartida {
            font-size: 0.9rem;
            margin-bottom: 10px;
            background: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
        }

        .card {
            background: white;
            color: #333;
            width: 95vw;
            max-width: 330px;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 5px solid #ddd;
            position: relative;
        }

        .card h2 {
            margin: 0 0 8px 0;
            font-size: 1rem;
            text-align: center;
            color: var(--secondary);
            border-bottom: 1px solid #eee;
        }

        .card img {
            width: 100%;
            height: 130px; /* Altura reducida para evitar scroll */
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        /* --- EL GRID DE 2 COLUMNAS (5 FILAS) --- */
        .grid-stats {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 columnas */
            gap: 6px;
        }

        .stat-btn {
            display: flex;
            flex-direction: column; /* Título arriba, valor abajo */
            align-items: center;
            background: #f8f9fa;
            border: 1px solid #ddd;
            padding: 5px 2px;
            border-radius: 6px;
            font-size: 0.7rem;
            color: #444;
            transition: all 0.2s;
            width: 100%;
            cursor: pointer;
        }

        .stat-btn b {
            color: var(--primary);
            font-size: 0.85rem;
        }

        .bloqueo {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            backdrop-filter: blur(2px);
        }
    </style>
</head>
<body>

    <h1>🏎️ Supercars Cards Battle</h1>

    <div id="menu">
        <div id="controles-iniciales">
            <button onclick="crearPartida()">Crear Nueva Partida</button>
            <br>
            <input type="number" id="codigoInput" placeholder="Código">
            <button onclick="unirsePartida()">Unirse</button>
        </div>

        <div id="areaCreador" style="display:none;">
            <p>Esperando a los demás jugadores...</p>
            <button onclick="iniciarJuego()" style="background-color: #2a9d8f;">¡Empezar con los que estén!</button>
        </div>
    </div>

    <div id="infoPartida">Conéctate para empezar</div>

    <div id="cartaJugador">
        </div>

    <script src="app.js"></script>

</body>
</html>
