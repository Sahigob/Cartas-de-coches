<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supercars Battle - Duelo de Cartas</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

   <style>
    :root {
        --primary: #e63946;
        --secondary: #1d3557;
        --light: #f1faee;
        --accent: #a8dadc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Segoe UI', sans-serif;
        background-color: var(--secondary);
        color: var(--light);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 10px;
    }

    h1 { font-size: 1.2rem; margin: 10px 0; text-transform: uppercase; }

    /* --- MENÚS --- */
    #menu {
        background: rgba(255, 255, 255, 0.1);
        padding: 15px;
        border-radius: 15px;
        width: 100%;
        max-width: 350px;
        text-align: center;
        margin-bottom: 10px;
    }

    input { padding: 8px; border-radius: 5px; border: none; width: 100px; margin: 5px; color: #000; }
    
    button {
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        background-color: var(--primary);
        color: white;
        font-weight: bold;
        cursor: pointer;
        text-transform: uppercase;
        font-size: 0.8rem;
    }

    #infoPartida {
        font-size: 0.9rem;
        margin-bottom: 10px;
        background: var(--primary);
        padding: 5px 20px;
        border-radius: 20px;
        font-weight: bold;
    }

    /* --- CARTAS --- */
    #cartaJugador {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        width: 100%;
    }

    .card {
        background: white;
        color: #333;
        width: 92vw;
        max-width: 320px;
        padding: 10px;
        border-radius: 15px;
        border: 5px solid #fff;
        position: relative;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .card h2 { font-size: 1rem; text-align: center; margin-bottom: 8px; color: var(--secondary); }
    .card img { width: 100%; height: 130px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }

    .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

    /* --- EL CAMBIO ESTÁ AQUÍ --- */
    .stat-btn {
        display: flex; 
        flex-direction: column; 
        align-items: center;
        background: #f8f9fa; 
        border: 1px solid #ddd; 
        padding: 5px 2px;
        border-radius: 6px; 
        font-size: 0.7rem; 
        cursor: pointer;
        /* Forzamos el color negro para que no herede el blanco del body */
        color: #000000 !important; 
    }

    .stat-btn b { 
        color: var(--primary) !important; 
        font-size: 0.85rem; 
    }

    /* --- DUELO Y EMPATE --- */
    .duelo-container { position: relative; }
    .estrella {
        position: absolute; top: -15px; right: -15px; font-size: 40px;
        z-index: 100; filter: drop-shadow(0 0 5px gold);
        animation: bounce 0.5s infinite alternate;
    }
    @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.2); } }

    .card.revelada { width: 155px; font-size: 0.7rem; border-width: 3px; }
    .card.revelada img { height: 70px; }
    .card.ganadora { border-color: #ffca28; box-shadow: 0 0 15px gold; }
    .empate-border { border-color: var(--accent) !important; }

    .bloqueo {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(255,255,255,0.7); display: flex;
        justify-content: center; align-items: center; z-index: 10;
        border-radius: 10px; color: #000 !important; font-weight: bold;
    }

    /* --- CHAT --- */
    #chat-container {
        width: 100%;
        max-width: 350px;
        background: rgba(0,0,0,0.4);
        border-radius: 15px;
        margin-top: 20px;
        padding: 10px;
        border: 1px solid rgba(255,255,255,0.1);
    }
    #lista-mensajes {
        height: 120px;
        overflow-y: auto;
        font-size: 0.85rem;
        margin-bottom: 8px;
        color: white;
    }
    .msg { margin-bottom: 4px; line-height: 1.2; }
    .chat-input-area { display: flex; gap: 5px; }
    #inputChat { flex-grow: 1; margin: 0; width: auto; font-size: 0.8rem; color: #000; }
</style>
</head>
<body>

    <h1>🏎️ Supercars Cards</h1>

    <div id="menu">
        <div id="controles-iniciales">
            <button onclick="crearPartida()">Crear Partida</button>
            <input type="number" id="codigoInput" placeholder="Código">
            <button onclick="unirsePartida()">Unirse</button>
        </div>
        <div id="areaCreador" style="display:none;">
            <p>Esperando jugadores...</p>
            <button onclick="iniciarJuego()" style="background-color: #2a9d8f;">¡EMPEZAR YA!</button>
        </div>
    </div>

    <div id="infoPartida">Conéctate para jugar</div>
    
    <div id="cartaJugador"></div>

    <div id="chat-container" style="display:none;">
        <div id="lista-mensajes"></div>
        <div class="chat-input-area">
            <input type="text" id="inputChat" placeholder="Escribe un mensaje...">
            <button onclick="enviarMensaje()">Enviar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
