<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supercars Battle - 2 o 3 Jugadores</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

   <style>
    :root {
        --primary: #e63946;
        --secondary: #1d3557;
        --light: #f1faee;
        --accent: #a8dadc;
        --success: #2a9d8f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--secondary);
        color: var(--light);
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 10px;
        overflow-x: hidden;
    }

    h1 {
        margin: 10px 0;
        font-size: 1.2rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        text-align: center;
    }

    /* --- MENÚ Y CONTROLES --- */
    #menu {
        background: rgba(255, 255, 255, 0.1);
        padding: 15px;
        border-radius: 15px;
        backdrop-filter: blur(5px);
        width: 100%;
        max-width: 340px;
        text-align: center;
        margin-bottom: 15px;
        border: 1px solid rgba(255,255,255,0.1);
    }

    input {
        padding: 10px;
        border-radius: 8px;
        border: none;
        width: 120px;
        font-size: 1rem;
        margin: 10px 5px;
        text-align: center;
    }

    button {
        padding: 10px 18px;
        border: none;
        border-radius: 8px;
        background-color: var(--primary);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.1s;
        text-transform: uppercase;
        font-size: 0.8rem;
    }

    button:active { transform: scale(0.95); }

    /* --- ÁREA DE JUEGO --- */
    #infoPartida {
        font-size: 0.9rem;
        margin-bottom: 12px;
        background: var(--primary);
        padding: 6px 20px;
        border-radius: 20px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    /* --- LA CARTA (DISEÑO COMPACTO 2 COLUMNAS) --- */
    .card {
        background: white;
        color: #333;
        width: 92vw;
        max-width: 320px;
        padding: 10px;
        border-radius: 15px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        border: 5px solid #fff;
        position: relative;
        margin-bottom: 20px;
    }

    .card h2 {
        margin: 0 0 8px 0;
        font-size: 1rem;
        text-align: center;
        color: var(--secondary);
        border-bottom: 2px solid #f0f0f0;
        padding-bottom: 4px;
    }

    .card img {
        width: 100%;
        height: 135px; /* Altura optimizada para móviles */
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 10px;
        display: block;
    }

    /* EL GRID DE 2 COLUMNAS / 5 FILAS */
    .grid-stats {
        display: grid;
        grid-template-columns: 1fr 1fr; /* 2 Columnas iguales */
        gap: 6px;
    }

    .stat-btn {
        display: flex;
        flex-direction: column; /* Etiqueta arriba, valor abajo */
        align-items: center;
        justify-content: center;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        padding: 6px 2px;
        border-radius: 8px;
        font-size: 0.7rem;
        color: #666;
        width: 100%;
        cursor: pointer;
    }

    .stat-btn b {
        color: var(--primary);
        font-size: 0.9rem;
        margin-top: 2px;
    }

    /* --- CAPA DE BLOQUEO (SIN BORROSO) --- */
    .bloqueo {
        position: absolute;
        top: 0; left: 0; 
        width: 100%; height: 100%;
        background: rgba(255, 255, 255, 0.5); /* Semi-transparente para que se vea la carta */
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 20;
        border-radius: 10px;
        color: #000;
        font-weight: 800;
        text-align: center;
        padding: 15px;
        pointer-events: all; /* Bloquea clics pero permite ver contenido */
    }

    /* Animación simple para cuando ganas una ronda */
    .ganador-ronda {
        animation: pulse 0.5s ease-in-out;
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.03); }
        100% { transform: scale(1); }
    }
</style>
</head>
<body>

    <h1>🏎️ Supercars Cards Battle</h1>

    <div id="menu">
        <div id="controles-iniciales">
            <button onclick="crearPartida()">Crear Nueva Partida</button>
            <br>
            <input type="number" id="codigoInput" placeholder="Código">
            <button onclick="unirsePartida()">Unirse</button>
        </div>

        <div id="areaCreador" style="display:none;">
            <p>Esperando a los demás jugadores...</p>
            <button onclick="iniciarJuego()" style="background-color: #2a9d8f;">¡Empezar con los que estén!</button>
        </div>
    </div>

    <div id="infoPartida">Conéctate para empezar</div>

    <div id="cartaJugador">
        </div>

    <script src="app.js"></script>

</body>
</html>
