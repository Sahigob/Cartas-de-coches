<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supercars Battle</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #e63946; --secondary: #1d3557; --light: #f1faee; --warning: #ff9800; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--secondary); color: var(--light); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 10px; }
        #menu { background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.2); }
        input { padding: 12px; border-radius: 8px; border: none; width: 150px; margin: 10px 5px; text-align: center; font-size: 1.1rem; color: #333; }
        button { padding: 12px 20px; border: none; border-radius: 8px; background-color: var(--primary); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #infoPartida { font-size: 1rem; margin-bottom: 15px; background: rgba(0,0,0,0.4); padding: 12px 20px; border-radius: 30px; text-align: center; border: 1px solid var(--primary); width: 90%; max-width: 400px; }
        #cartaJugador { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; width: 100%; }
        .card { background: white; color: #333; width: 320px; padding: 15px; border-radius: 15px; border: 4px solid #fff; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .card h2 { font-size: 1.1rem; text-align: center; margin-bottom: 10px; color: var(--secondary); border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .card img { width: 100%; height: 160px; object-fit: cover; border-radius: 10px; margin-bottom: 12px; }
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f0f2f5; border: 1px solid #ccc; padding: 8px 4px; border-radius: 10px; font-size: 0.75rem; color: #444; cursor: pointer; }
        .stat-btn b { font-size: 0.95rem; margin-top: 2px; color: var(--primary); }
        .duelo-container { position: relative; }
        .estrella { position: absolute; top: -20px; right: -20px; font-size: 50px; z-index: 100; filter: drop-shadow(0 0 10px gold); animation: pulse 0.6s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.3); } }
        .card.revelada { width: 170px; font-size: 0.8rem; padding: 8px; }
        .card.revelada img { height: 90px; }
        .card.ganadora { border-color: gold; box-shadow: 0 0 20px gold; }
        .card.empate-border { border-color: var(--warning); box-shadow: 0 0 20px var(--warning); }
        .bloqueo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); display: flex; justify-content: center; align-items: center; z-index: 10; border-radius: 10px; color: #000; font-weight: bold; }
        .empate-msg { color: var(--warning); font-weight: bold; }
    </style>
</head>
<body>
    <h1>🏎️ Supercars Battle</h1>
    <div id="menu">
        <div id="controles-iniciales">
            <button onclick="crearPartida()">Crear Partida</button>
            <div style="margin: 10px 0;">o</div>
            <input type="text" id="codigoInput" placeholder="Código">
            <button onclick="unirsePartida()">Unirse</button>
        </div>
        <div id="areaCreador" style="display:none; margin-top: 15px;">
            <button onclick="iniciarJuego()" style="background-color: #2a9d8f;">¡EMPEZAR PARTIDA!</button>
        </div>
    </div>
    <div id="infoPartida">Crea una partida para empezar</div>
    <div id="cartaJugador"></div>
    <script src="app.js"></script>
</body>
</html>
