<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juego de Cartas de Coches - 3 Jugadores</title>
  <link rel="stylesheet" href="style.css">
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
  <h1>Juego de Cartas de Coches - 3 Jugadores</h1>

  <div id="menu">
    <button onclick="crearPartida()">Crear Partida</button>
    <input type="number" id="codigoPartida" placeholder="Código de Partida">
    <button onclick="unirsePartida(document.getElementById('codigoPartida').value)">Unirse a Partida</button>
  </div>

  <div id="cartaJugador"></div>

  <script src="app.js"></script>
</body>
</html>
